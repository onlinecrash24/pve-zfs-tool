# Prometheus scrape config for pve-zfs-tool's /metrics endpoint.
#
# The endpoint is opt-in: the application enables it only when the
# PROMETHEUS_TOKEN environment variable is set on the zfs-tool container.
# Set the same token in the .env file next to docker-compose.yml -- both
# containers read it.

global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    monitor: pve-zfs-tool

scrape_configs:
  - job_name: pvezfs
    metrics_path: /metrics
    scheme: http
    # The zfs-tool container resolves to its compose service name on the
    # internal monitoring network.
    static_configs:
      - targets: ['zfs-tool:5000']
        labels:
          instance: pve-zfs-tool
    authorization:
      type: Bearer
      credentials_file: /etc/prometheus/token
