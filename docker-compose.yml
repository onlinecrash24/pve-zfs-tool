services:
  zfs-tool:
    build: .
    container_name: zfs-tool
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ssh-keys:/root/.ssh
      - zfs-data:/app/data
    environment:
      - SECRET_KEY=change-me-in-production
      - ADMIN_USER=admin
      - ADMIN_PASSWORD=password

volumes:
  ssh-keys:
  zfs-data:
