services:
  zfs-tool:
    build: .
    container_name: zfs-tool
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ssh-keys:/root/.ssh
      - zfs-data:/app/data
    environment:
      - SECRET_KEY=change-me-in-production
      - ADMIN_USER=admin
      - ADMIN_PASSWORD=password
      - FORCE_HTTPS=true  # HTTPS behind reverse proxy
      - TZ=Europe/Berlin  # Timezone (e.g. Europe/Berlin, UTC, America/New_York)
      - DEFAULT_LANG=de   # Default UI language for new visitors: de or en (user can still switch)
      # Data retention (days) — auto-cleaned; lower these if the zfs-data
      # volume grows too large. <=0 keeps forever.
      - METRICS_RETENTION_DAYS=90    # pool + disk (SMART) history
      - AUDIT_RETENTION_DAYS=365     # audit log history

volumes:
  ssh-keys:
  zfs-data:
