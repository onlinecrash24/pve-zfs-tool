name: Build & Publish Docker Image

on:
  push:
    branches:
      - dev               # Dev-Branch: baut Image mit :dev Tag zum Testen
    tags:
      - "v*"               # Release-Build: ein Image, alle Release-Tags
                           # (:latest + :X.Y.Z + :X.Y + :sha-xxxxxxx)
                           # Reine main-Pushes ohne Tag triggern KEINEN
                           # Build mehr -- der nächste Tag-Push baut das
                           # Release-Image; das vermeidet die früher
                           # entstandenen Doppel-Images, bei denen
                           # :latest und :0.9.X auf unterschiedliche
                           # digests zeigten.
  pull_request:
    branches:
      - main              # Bei PRs nur bauen, nicht pushen
  workflow_dispatch:      # Manuell ausführbar über GitHub UI

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # onlinecrash24/pve-zfs-tool

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write     # Nötig für ghcr.io Push

    steps:
      # 1. Repo auschecken
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Docker Buildx einrichten (Multi-Plattform-Support)
      #
      # Mit Docker-Hub-Mirror "mirror.gcr.io" konfiguriert. Direkte Pulls
      # gegen registry-1.docker.io brechen auf den GHA-Runnern regelmaessig
      # mit "Client.Timeout exceeded while awaiting headers" ab (Docker-Hub-
      # Rate-Limit pro IP, transiente Ausfaelle). mirror.gcr.io ist Googles
      # offizieller, hochverfuegbarer Mirror -- buildx zieht das Base-Image
      # `python:3.12-slim` zuerst dort und nur als Fallback bei Docker Hub.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]

      # 3. Login bei ghcr.io (automatisch mit GITHUB_TOKEN)
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. Docker Metadaten & Tags generieren
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Bei Push auf dev → :dev
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}
            # Bei Tag v1.2.3:
            #   :latest        (zeigt auf den selben digest wie die anderen)
            #   :1.2.3 + :1.2  (semver)
            #   :sha-abc1234   (Commit-SHA, immer)
            # Alle vier Tags landen in einem einzigen Build → ein digest.
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      # 5. Image bauen und pushen
      #
      # Cache-Strategie: GHA-Cache läuft als "continue-on-error" mit, weil
      # der GitHub-Actions-Cache-Service phasenweise mit "buildkit cache
      # export error" o.ä. ausfällt -- ohne den continue-on-error würde der
      # ganze Release-Build daran scheitern. Bei Cache-Fehlern wird einfach
      # ohne Cache neu gebaut.
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        continue-on-error: true
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Optional: Multi-Arch (amd64 + arm64, z.B. für Raspberry Pi)
          # platforms: linux/amd64,linux/arm64

      # 5b. Fallback ohne Cache, falls Schritt 5 wegen Cache-Problemen
      # gescheitert ist. Wenn Schritt 5 sauber durchlief, wird dieser Step
      # übersprungen.
      - name: Build and push Docker image (no cache fallback)
        if: steps.build.outcome == 'failure'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
