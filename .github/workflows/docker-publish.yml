name: Build & Publish Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v0.9.4"          # z.B. v1.0.0 → triggert Release-Build
  pull_request:
    branches:
      - main              # Bei PRs nur bauen, nicht pushen
  workflow_dispatch:      # Manuell ausführbar über GitHub UI

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # onlinecrash24/pve-zfs-tool

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write     # Nötig für ghcr.io Push

    steps:
      # 1. Repo auschecken
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Docker Buildx einrichten (Multi-Plattform-Support)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Login bei ghcr.io (automatisch mit GITHUB_TOKEN)
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. Docker Metadaten & Tags generieren
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Bei Push auf main → :latest
            type=raw,value=latest,enable={{is_default_branch}}
            # Bei Tags wie v1.2.3 → :1.2.3 und :1.2 und :1
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # Immer: kurzer Commit-SHA → :sha-abc1234
            type=sha,prefix=sha-,format=short

      # 5. Image bauen und pushen
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache zwischen Builds wiederverwenden (schnellere CI)
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Optional: Multi-Arch (amd64 + arm64, z.B. für Raspberry Pi)
          # platforms: linux/amd64,linux/arm64
