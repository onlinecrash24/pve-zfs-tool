<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PVE ZFS Tool</title>
    <link rel="icon" type="image/svg+xml" href="/static/img/favicon/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/img/favicon/favicon-32.png?v=3">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/img/favicon/favicon-16.png?v=3">
    <link rel="apple-touch-icon" sizes="192x192" href="/static/img/favicon/favicon-192.png?v=3">
    <link rel="stylesheet" href="/static/css/style.css?v=0.9.168">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="#" onclick="navigate('home'); return false;" style="text-decoration:none">
                    <img src="/static/img/logo.svg?v=3" alt="PVE ZFS Tool" class="sidebar-logo">
                </a>
            </div>

            <nav class="sidebar-nav" id="sidebar-nav">
                <div class="nav-section" data-i18n="nav_overview">Overview</div>
                <div class="nav-item active" data-view="home">
                    <svg class="icon" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18"><path fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M3 11l9-7 9 7"></path><path fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M5 10v10h14V10"></path></svg> <span data-i18n="nav_home">Home</span>
                </div>
                <div class="nav-item" data-view="hosts">
                    <svg class="icon" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18"><rect fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" x="3" y="4" width="18" height="6" rx="1.2"></rect><rect fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" x="3" y="14" width="18" height="6" rx="1.2"></rect><circle fill="currentColor" cx="7" cy="7" r="0.9"></circle><circle fill="currentColor" cx="7" cy="17" r="0.9"></circle></svg> <span data-i18n="nav_hosts">Hosts</span>
                </div>

                <div class="nav-section" data-i18n="nav_zfs">ZFS</div>
                <div class="nav-item" data-view="pools">
                    <svg class="icon" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18"><path fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M12 3 21 8 12 13 3 8Z"></path><path fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M3 12l9 5 9-5"></path><path fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M3 16l9 5 9-5"></path></svg> <span data-i18n="nav_pools">Pools</span>
                </div>
                <div class="nav-item" data-view="datasets">
                    <svg class="icon" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18"><path fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M3 6h6l2 2h10v11H3Z"></path></svg> <span data-i18n="nav_datasets">Datasets</span>
                </div>
                <div class="nav-item" data-view="snapshots">
                    <svg class="icon" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18"><rect fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" x="3" y="7" width="18" height="12" rx="2"></rect><path fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M8 7l1.6-2.5h4.8L16 7"></path><circle fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" cx="12" cy="13" r="3.2"></circle></svg> <span data-i18n="nav_snapshots">Snapshots</span>
                </div>
                <div class="nav-item" data-view="snapshot-check">
                    <svg class="icon" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18"><circle fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" cx="10" cy="10" r="6"></circle><line fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" x1="14.6" y1="14.6" x2="20" y2="20"></line></svg> <span data-i18n="nav_snapshot_check">Snapshot Check</span>
                </div>
                <div class="nav-item" data-view="replication">
                    <svg class="icon" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18"><path fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M4 11a8 8 0 0113.6-5.6M20 6v5h-5"></path><path fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M20 13a8 8 0 01-13.6 5.6M4 18v-5h5"></path></svg> <span data-i18n="nav_replication">Replication</span>
                </div>
                <div class="nav-item" data-view="dr">
                    <svg class="icon" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18"><path fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M12 3l7 3v5c0 5-3 8-7 10-4-2-7-5-7-10V6Z"></path><path fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4"></path></svg> <span data-i18n="nav_dr">Disaster Recovery</span>
                </div>

                <div class="nav-section" data-i18n="nav_proxmox">Proxmox VE</div>
                <div class="nav-item" data-view="guests">
                    <svg class="icon" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18"><rect fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" x="3" y="4" width="18" height="12" rx="1.5"></rect><line fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" x1="9" y1="20" x2="15" y2="20"></line><line fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" x1="12" y1="16" x2="12" y2="20"></line></svg> <span data-i18n="nav_vms_cts">VMs & CTs</span>
                </div>
                <div class="nav-item" data-view="config-restore">
                    <svg class="icon" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18"><rect fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" x="3" y="4" width="18" height="5" rx="1"></rect><rect fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" x="5" y="9" width="14" height="11" rx="1"></rect><path fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M9.5 14.5l2.5-2.5 2.5 2.5M12 12v6"></path></svg> <span data-i18n="nav_config_restore">PVE Config Restore</span>
                </div>

                <div class="nav-section" data-i18n="nav_system">System</div>
                <div class="nav-item" data-view="health">
                    <svg class="icon" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18"><path fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M3 12h4l2-7 4 14 2-7h6"></path></svg> <span data-i18n="nav_health">Health</span>
                </div>
                <div class="nav-item" data-view="metrics">
                    <svg class="icon" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18"><rect fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" x="4" y="12" width="3.6" height="8"></rect><rect fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" x="10.2" y="7" width="3.6" height="13"></rect><rect fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" x="16.4" y="3" width="3.6" height="17"></rect></svg> <span data-i18n="nav_metrics">Metrics</span>
                </div>
                <div class="nav-item" data-view="audit">
                    <svg class="icon" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18"><path fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M6 3h9l3 3v15H6Z"></path><line fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" x1="9" y1="11" x2="15" y2="11"></line><line fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" x1="9" y1="14.5" x2="15" y2="14.5"></line><line fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" x1="9" y1="18" x2="13" y2="18"></line></svg> <span data-i18n="nav_audit">Audit Log</span>
                </div>
                <div class="nav-item" data-view="notifications">
                    <svg class="icon" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18"><path fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M6 16V11a6 6 0 0112 0v5l2 3H4Z"></path><path fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" d="M10 20a2 2 0 004 0"></path></svg> <span data-i18n="nav_notifications">Notifications</span>
                </div>
                <div class="nav-item" data-view="ai">
                    <svg class="icon" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18"><rect fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" x="5" y="9" width="14" height="10" rx="3"></rect><line fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" x1="12" y1="5" x2="12" y2="9"></line><circle fill="currentColor" cx="12" cy="4" r="1.1"></circle><circle fill="currentColor" cx="9.5" cy="14" r="1.1"></circle><circle fill="currentColor" cx="14.5" cy="14" r="1.1"></circle></svg> <span data-i18n="nav_ai">AI Reports</span>
                </div>
            </nav>

            <div class="host-selector">
                <label data-i18n="active_host">Active Host</label>
                <select id="host-select">
                    <option value="">-- Select Host --</option>
                </select>
            </div>

            <!-- Language flags + logout in one compact row -->
            <div class="host-selector" style="border-top: none; padding-top: 0;">
                <div style="display:flex; gap:6px; align-items:stretch;">
                    <button class="btn btn-sm" id="lang-de" title="Deutsch" aria-label="Deutsch"
                            style="display:flex;align-items:center;justify-content:center;padding:4px 8px;">
                        <svg viewBox="0 0 60 36" width="22" height="13" style="display:block;border-radius:2px">
                            <rect width="60" height="12" fill="#000"/>
                            <rect y="12" width="60" height="12" fill="#DD0000"/>
                            <rect y="24" width="60" height="12" fill="#FFCE00"/>
                        </svg>
                    </button>
                    <button class="btn btn-sm" id="lang-en" title="English" aria-label="English"
                            style="display:flex;align-items:center;justify-content:center;padding:4px 8px;">
                        <svg viewBox="0 0 60 36" width="22" height="13" style="display:block;border-radius:2px">
                            <rect width="60" height="36" fill="#012169"/>
                            <path d="M0,0 L60,36 M60,0 L0,36" stroke="#fff" stroke-width="7"/>
                            <path d="M0,0 L60,36 M60,0 L0,36" stroke="#C8102E" stroke-width="3"/>
                            <path d="M30,0 V36 M0,18 H60" stroke="#fff" stroke-width="12"/>
                            <path d="M30,0 V36 M0,18 H60" stroke="#C8102E" stroke-width="7"/>
                        </svg>
                    </button>
                    <button class="btn btn-sm" id="logout-btn" style="flex:1;opacity:0.8" data-i18n="logout">Logout</button>
                </div>
            </div>
        </aside>

        <!-- Main -->
        <main class="main-content">
            <div id="main-view"></div>
        </main>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <span id="modal-title">Modal</span>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
            <div class="modal-footer" id="modal-footer">
                <button class="btn" onclick="closeModal()">Close</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast-container" id="toast-container"></div>

    <script>window.ZFS_DEFAULT_LANG = "{{ default_lang }}";</script>
    <script src="/static/js/i18n.js?v=0.9.168"></script>
    <script src="/static/js/app.js?v=0.9.168"></script>
</body>
</html>
