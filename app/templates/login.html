<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PVE ZFS Tool – Login</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
        .login-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px 32px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .login-logo {
            display: block;
            width: 280px;
            max-width: 100%;
            margin: 0 auto 32px;
        }
        .login-card .form-group {
            margin-bottom: 16px;
        }
        .login-card label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }
        .login-card .form-control {
            width: 100%;
            padding: 10px 14px;
            font-size: 14px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            box-sizing: border-box;
        }
        .login-card .form-control:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            background: var(--accent);
            color: white;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
        }
        .login-btn:hover {
            background: #2563eb;
        }
        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .login-error {
            color: var(--danger);
            font-size: 13px;
            text-align: center;
            margin-top: 12px;
            min-height: 20px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <img src="/static/img/logo.png" alt="PVE ZFS Tool" class="login-logo">
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input class="form-control" id="username" type="text" autocomplete="username" autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input class="form-control" id="password" type="password" autocomplete="current-password">
                </div>
                <button type="submit" class="login-btn" id="login-btn">Login</button>
                <div class="login-error" id="login-error"></div>
            </form>
        </div>
    </div>
    <script>
        document.getElementById("login-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = document.getElementById("login-btn");
            const errEl = document.getElementById("login-error");
            errEl.textContent = "";
            btn.disabled = true;
            btn.textContent = "Logging in...";
            try {
                const r = await fetch("/api/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        username: document.getElementById("username").value,
                        password: document.getElementById("password").value,
                    }),
                });
                const data = await r.json();
                if (data.success) {
                    window.location.href = "/";
                } else {
                    errEl.textContent = data.error || "Login failed";
                    btn.disabled = false;
                    btn.textContent = "Login";
                }
            } catch (err) {
                errEl.textContent = "Connection error";
                btn.disabled = false;
                btn.textContent = "Login";
            }
        });
    </script>
</body>
</html>
